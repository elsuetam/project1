<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Anna Laura Pedroso ❤️</title>

    <style>

        body{
            background:#ffd6e8;
            font-family:Arial, Helvetica, sans-serif;
            text-align:center;
            margin:0;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .caixa{
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 0 20px rgba(0,0,0,.2);
            width:80%;
            max-width:600px;
        }

        h1{
            color:#ff0066;
        }

        p{
            font-size:22px;
            line-height:1.6;
        }

        button{
            padding:15px 30px;
            font-size:18px;
            border:none;
            border-radius:20px;
            background:#ff4d88;
            color:white;
            cursor:pointer;
            margin-top:20px;
        }

        button:hover{
            background:#d6006d;
        }

    </style>

</head>

<body>

<div class="caixa">

<h1>❤️ Para Anna Laura Pedroso ❤️</h1>

<button onclick="mostrarMensagem()">
Clique aqui ❤️
</button>

<div id="mensagem"></div>

</div>

<script>

function mostrarMensagem(){

document.getElementById("mensagem").innerHTML = `
<p>Obrigado por ser a mulher da minha vida.</p>

<p>Obrigado por iluminar meus dias.</p>

<p>Você faz tudo ficar mais bonito.</p>

<p>Sou muito feliz por ter você ao meu lado.</p>

<h2 style="color:#ff0066;">
Eu te amo infinitamente ❤️
</h2>
`;

}

</script>

</body>

</html>
